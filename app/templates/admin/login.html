<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login — TicketInit</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230369a1'/><text x='50%25' y='55%25' font-size='18' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='sans-serif' font-weight='bold'>T</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#f0f9ff',100:'#e0f2fe',200:'#bae6fd',600:'#0284c7',700:'#0369a1',800:'#075985',900:'#0c4a6e' },
            ink:   { 50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',300:'#cbd5e1',400:'#94a3b8',500:'#64748b',700:'#334155',800:'#1e293b',900:'#0f172a' },
          },
          fontFamily: { display:['Syne','sans-serif'], body:['DM Sans','sans-serif'] },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    h1, h2, .font-display { font-family: 'Syne', sans-serif; }
    .field {
      width:100%; background:#f8fafc; border:1px solid #e2e8f0;
      border-radius:.5rem; padding:.625rem 1rem; font-size:.875rem;
      color:#1e293b; outline:none; transition:box-shadow .15s,border-color .15s;
    }
    .field:focus { border-color:#0369a1; box-shadow:0 0 0 3px rgba(3,105,161,.15); }
  </style>
</head>

<body class="min-h-screen bg-ink-50 flex items-center justify-center p-4 antialiased">

  <!-- Subtle background pattern matching the hero gradient on public site -->
  <div class="fixed inset-0 -z-10 pointer-events-none"
       style="background:
         radial-gradient(900px 500px at 0% 0%, rgba(3,105,161,.10) 0%, transparent 60%),
         radial-gradient(600px 400px at 100% 100%, rgba(2,132,199,.08) 0%, transparent 55%),
         #f8fafc;">
  </div>

  <div class="w-full max-w-sm">

    <a href="/" class="flex items-center gap-2.5 mb-8 justify-center group">
      <div class="w-10 h-10 rounded-xl bg-brand-700 flex items-center justify-center shadow-sm
                  group-hover:bg-brand-800 transition-colors">
        <i class="fa-solid fa-ticket text-white"></i>
      </div>
      <span class="font-display font-extrabold text-2xl tracking-tight text-ink-900">
        Ticket<span class="text-brand-700">Init</span>
      </span>
    </a>

    <div class="bg-white rounded-2xl border border-ink-200 shadow-sm overflow-hidden">

      <div class="px-6 pt-6 pb-5 border-b border-ink-100">
        <h1 class="font-display font-bold text-xl text-ink-900">Admin login</h1>
        <p class="text-sm text-ink-400 mt-0.5">Sign in to manage your events and orders.</p>
      </div>

      {% if error %}
      <div class="mx-6 mt-5 flex items-center gap-2.5 p-3 bg-red-50 border border-red-100
                  rounded-xl text-red-600 text-sm">
        <i class="fa-solid fa-circle-exclamation shrink-0"></i>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/admin/login" class="px-6 py-5 space-y-4">
        <div>
          <label class="block text-sm font-semibold text-ink-700 mb-1.5" for="username">
            Username
          </label>
          <div class="relative">
            <i class="fa-solid fa-user absolute left-3.5 top-1/2 -translate-y-1/2 text-ink-300 text-sm"></i>
            <input type="text" id="username" name="username"
                   class="field pl-10" placeholder="admin"
                   autocomplete="username" required autofocus />
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-ink-700 mb-1.5" for="password">
            Password
          </label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-ink-300 text-sm"></i>
            <input type="password" id="password" name="password"
                   class="field pl-10" placeholder="••••••••"
                   autocomplete="current-password" required />
            <button type="button" id="togglePw"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-ink-300
                           hover:text-ink-500 transition-colors text-sm">
              <i class="fa-solid fa-eye" id="togglePwIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit"
                class="w-full flex items-center justify-center gap-2 py-2.5 px-4 mt-2
                       bg-brand-700 hover:bg-brand-800 text-white font-semibold
                       rounded-xl transition-colors text-sm">
          <i class="fa-solid fa-arrow-right-to-bracket"></i>
          Sign in
        </button>
      </form>

    </div>

    <p class="text-center text-xs text-ink-400 mt-5">
      <a href="/" class="hover:text-brand-700 transition-colors">
        <i class="fa-solid fa-arrow-left mr-1"></i>Back to public site
      </a>
    </p>
  </div>

  <script>
    const btn  = document.getElementById('togglePw');
    const icon = document.getElementById('togglePwIcon');
    const pw   = document.getElementById('password');
    btn.addEventListener('click', () => {
      const show = pw.type === 'password';
      pw.type = show ? 'text' : 'password';
      icon.className = show ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
    });
  </script>
</body>
</html>
